# .swiftlint.yml — Glazer AI
# SwiftLint configuration. Run via: swiftlint lint --strict

included:
  - GlazerAI
  - GlazerAITests

excluded:
  - GlazerAI/Resources

opt_in_rules:
  - force_cast
  - force_try
  - implicitly_unwrapped_optional

disabled_rules: []

identifier_name:
  excluded:
    - db
    - id
    - vm
    - jd
    - n

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 800

function_body_length:
  warning: 40
  error: 60

cyclomatic_complexity:
  warning: 10
  error: 20

force_cast: error
force_try: error
implicitly_unwrapped_optional: warning
