appId: com.glazerai.app
productName: Glazer AI
directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - node_modules/**/*
  - package.json

mac:
  category: public.app-category.utilities
  icon: assets/icons/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]

win:
  icon: assets/icons/icon.png
  target:
    - target: nsis
      arch: [x64]

linux:
  icon: assets/icons/icon.png
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Utility
